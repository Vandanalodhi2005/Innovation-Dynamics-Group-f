<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Innovation Dynamics Group</title>

    <!-- Preconnect to Google Fonts origins early -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Non-blocking Google Fonts: loads as print first, switches to all once loaded -->
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Outfit:wght@400;500;600;700;800;900&display=swap"
      media="print"
      onload="this.media='all'"
    />
    <!-- Fallback for no-JS -->
    <noscript>
      <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Outfit:wght@400;500;600;700;800;900&display=swap" />
    </noscript>
  </head>
  <body>
    <div id="root"></div>

    <!-- Clover SDK deferred — no longer blocks rendering -->
    <script src="https://checkout.clover.com/sdk.js" defer></script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
